steps:
  # Pull previous image to use as build cache (|| true so first deploy doesn't fail)
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args: ["-c", "docker pull gcr.io/$PROJECT_ID/alek-bot:latest || true"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "--cache-from", "gcr.io/$PROJECT_ID/alek-bot:latest",
           "-t", "gcr.io/$PROJECT_ID/alek-bot:latest", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/alek-bot:latest"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "alek-bot"
      - "--image=gcr.io/$PROJECT_ID/alek-bot:latest"
      - "--region=us-central1"
      - "--set-env-vars=APP_ENV=production,SLACK_MODE=http,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_RUN_SERVICE_URL=$_SERVICE_URL,FIRESTORE_DATABASE=us-production,OAUTH_REDIRECT_URI=$_OAUTH_REDIRECT_URI,ENABLE_HISTORY_OPTIMIZATION=true,ENABLE_HTML_RENDERER=true,ENABLE_GROUNDING_ATTRIBUTION=false"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--memory=1024Mi"
      - "--cpu=2"
      - "--timeout=1800"
      - "--port=8080"
      - "--allow-unauthenticated"
      - "--set-secrets=SLACK_BOT_TOKEN=SLACK_BOT_TOKEN:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,FIREBASE_WEB_API_KEY=FIREBASE_WEB_API_KEY:latest,OAUTH_SESSION_SECRET=OAUTH_SESSION_SECRET:latest,DOCS_OWNER_USER_ID=docs-owner-user-id:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_WEBHOOK_SECRET=TELEGRAM_WEBHOOK_SECRET:latest,GMAIL_OAUTH_REDIRECT_URI=GMAIL_OAUTH_REDIRECT_URI_PROD:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,MICROSOFT_TODO_CLIENT_ID=MICROSOFT_TODO_CLIENT_ID:latest,MICROSOFT_TODO_CLIENT_SECRET=MICROSOFT_TODO_CLIENT_SECRET:latest,MICROSOFT_TODO_REDIRECT_URI=MICROSOFT_TODO_REDIRECT_URI_PROD:latest,MICROSOFT_TASKS_WEBHOOK_SECRET=MICROSOFT_TASKS_WEBHOOK_SECRET:latest"

  # Deploy Cloud Run Job for deep research (same image, different entrypoint).
  # task-timeout: 3600s (1 hour) — covers first pass + second pass for large research.
  # max-retries: 0 — no automatic retries; the research loop has its own overload retry.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "alek-research-job"
      - "--image=gcr.io/$PROJECT_ID/alek-bot:latest"
      - "--region=us-central1"
      - "--command=python"
      - "--args=job_main.py"
      - "--max-retries=0"
      - "--task-timeout=18000"
      - "--memory=1024Mi"
      - "--cpu=2"
      - "--set-env-vars=APP_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_RUN_SERVICE_URL=$_SERVICE_URL"
      - "--set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"
      - "--project=$PROJECT_ID"

  # Explicitly grant public access — --allow-unauthenticated alone is not
  # reliable if the Cloud Build SA lacks roles/iam.securityAdmin.
  # This step is idempotent and ensures every deployment leaves the service
  # publicly accessible.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "add-iam-policy-binding"
      - "alek-bot-prod"
      - "--region=us-central1"
      - "--member=allUsers"
      - "--role=roles/run.invoker"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud scheduler jobs describe alek-bot-prod-renew-task-subscriptions \
          --location=us-central1 --project=$PROJECT_ID &>/dev/null \
        && gcloud scheduler jobs update http alek-bot-prod-renew-task-subscriptions \
          --schedule="0 2 * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"renew_all_task_subscriptions"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-prod-renew-task-subscriptions \
          --schedule="0 2 * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"renew_all_task_subscriptions"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-prod-start-email-indexing \
          --location=us-central1 --project=$PROJECT_ID &>/dev/null \
        && gcloud scheduler jobs update http alek-bot-prod-start-email-indexing \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"start_email_indexing"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-prod-start-email-indexing \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"start_email_indexing"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-prod-fire-due-reminders \
          --location=us-central1 --project=$PROJECT_ID &>/dev/null \
        && gcloud scheduler jobs update http alek-bot-prod-fire-due-reminders \
          --schedule="*/5 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"fire_due_reminders"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-prod-fire-due-reminders \
          --schedule="*/5 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --http-method=POST \
          --message-body='{"task_type":"fire_due_reminders"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID
