# OAuth Authentication Configuration
# OAuth Multi-Tenant Session 3
# RFC: docs/10_rfcs/MULTI_TENANT_OAUTH_RFC.md

# This file serves as documentation for OAuth configuration.
# Actual values are read from environment variables (see src/config/auth.py).

# ============================================================================
# Firebase Authentication (MVP Provider)
# ============================================================================
firebase:
  # GCP Project ID (e.g., "alek-core-prod", "alek-core-dev")
  # Environment variable: FIREBASE_PROJECT_ID
  project_id: "alek-core-dev"

  # Firebase Web API Key (from Firebase Console > Project Settings)
  # Used for Firebase Auth REST API (token refresh, etc.)
  # Environment variable: FIREBASE_WEB_API_KEY
  web_api_key: "your-web-api-key-here"

  # Service Account Path (for Firebase Admin SDK)
  # Environment variable: GOOGLE_APPLICATION_CREDENTIALS
  # If not set, uses Application Default Credentials
  service_account_path: null  # Optional

# ============================================================================
# OAuth Redirect URLs (Environment-Specific)
# ============================================================================
oauth:
  # Development redirect URI
  # Environment variable: OAUTH_REDIRECT_URI_DEV
  redirect_uri_dev: "http://localhost:8080/auth/callback"

  # Production redirect URI
  # Environment variable: OAUTH_REDIRECT_URI_PROD
  redirect_uri_prod: "https://alek.ai/auth/callback"

  # Session secret for CSRF protection
  # Environment variable: OAUTH_SESSION_SECRET
  # Must be a random 32+ character string
  session_secret: "change-me-in-production"

  # Token expiration (seconds)
  access_token_ttl: 3600  # 1 hour
  refresh_token_ttl: 2592000  # 30 days

# ============================================================================
# Future Providers (Phase 2+)
# ============================================================================
# aws_cognito:
#   region: "us-east-1"
#   user_pool_id: "us-east-1_XXX"
#   client_id: "xxx"
#
# okta:
#   domain: "dev-xxx.okta.com"
#   client_id: "xxx"
#   client_secret: "xxx"
#
# auth0:
#   domain: "xxx.auth0.com"
#   client_id: "xxx"
#   client_secret: "xxx"

# ============================================================================
# Default Provider Selection
# ============================================================================
# Environment variable: DEFAULT_AUTH_PROVIDER
# Values: firebase (MVP), cognito, okta, auth0 (future)
default_provider: "firebase"
