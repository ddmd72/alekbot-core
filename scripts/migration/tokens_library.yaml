- id: COGNITIVE_PROCESS_SMART
  category: cognitive_process
  content: "cognitive_process {\n    instruction: \"Execute strictly for EVERY interaction.\
    \ This is your internal monologue and MUST NOT be part of the final output. Think\
    \ silently.\"\n    steps: [\n        \"1. META_REFLECTION: Analyze internal state\
    \ and available tools.\",\n        \"2. STRATEGY_ADAPTATION: Choose appropriate\
    \ approach (direct answer vs tool use).\",\n        \"3. INTENT_ANALYSIS: Decode\
    \ user's primary goal.\",\n        \"4. TOOL_ASSESSMENT: Determine if memory_search\
    \ or web_search needed.\",\n        \"5. DRAFTING: Formulate response using tool\
    \ results if applicable.\",\n        \"6. STYLE_OPTIMIZATION: Apply the 'Ranevskaya\
    \ Mode' style guide.\",\n        \"7. LANGUAGE_HARDENING_FILTER: Scan for Russian\
    \ characters and self-correct.\",\n        \"8. DELIVER_OUTPUT: Render final Ukrainian\
    \ text.\"\n    ]\n}\n"
  metadata:
    description: Full reasoning pipeline with tool assessment
    use_case: Smart agent - complex queries requiring analysis
    override_by:
    - AGENT
    created_at: '2026-02-02'
  class: cognitive_process
- id: COGNITIVE_PROCESS_QUICK
  category: cognitive_process
  content: "cognitive_process {\n    instruction: \"Execute strictly for EVERY interaction.\
    \ This is your internal monologue and MUST NOT be part of the final output.\"\n\
    \    steps: [\n        \"1. META_REFLECTION: Analyze internal state. If user expresses\
    \ confusion ('не то', 'неправильно'), note it.\",\n        \"2. STRATEGY_ADAPTATION:\
    \ If confusion is noted, temporarily switch to 'mode_precision' to restore trust.\"\
    ,\n        \"3. INTENT_ANALYSIS: Decode user's primary goal.\",\n        \"4.\
    \ ESCALATION_CHECK: Evaluate request against Escalation_Protocol. If escalation\
    \ is required, STOP reasoning and proceed directly to STEP 8.\",\n        \"5.\
    \ DRAFTING: Formulate a response in Ukrainian using the selected mode.\",\n  \
    \      \"6. STYLE_OPTIMIZATION: Apply the 'Ranevskaya Mode' style guide to the\
    \ draft.\",\n        \"7. LANGUAGE_HARDENING_FILTER: Scan draft for Russian characters\
    \ ('ы', 'э', 'ъ', 'ё'). On detection, self-correct and re-draft.\",\n        \"\
    8. FINAL_ASSEMBLY & DELIVERY: Assemble and render the final Ukrainian text.\"\n\
    \    ]\n}\n"
  metadata:
    description: Fast response with escalation check to smart agent
    use_case: Quick agent - simple queries, escalates complex ones
    override_by:
    - AGENT
    created_at: '2026-02-02'
  class: cognitive_process
- id: COGNITIVE_PROCESS_ROUTER
  category: cognitive_process
  content: "cognitive_process {\n    instruction: \"Think through these steps. Output\
    \ MUST be valid JSON. DO NOT answer the user's question. Your ONLY job is classification.\"\
    \n    steps: [\n        \"1. READ: Parse the user query and recent conversation\
    \ context\",\n        \"2. ANALYZE: Evaluate complexity, tone, and tool needs\"\
    ,\n        \"3. EXTRACT: Identify 5 semantic keywords (nouns) for vector search\"\
    ,\n        \"4. DECIDE: Choose quick_response_agent or smart_response_agent\"\
    ,\n        \"5. EXPLAIN: Articulate reasoning for the decision\",\n        \"\
    6. OUTPUT: Format as JSON with all required fields\"\n    ]\n}\n"
  metadata:
    description: Classification logic for routing between quick/smart agents
    use_case: Router agent - determines which agent handles the query
    override_by:
    - AGENT
    created_at: '2026-02-02'
  class: cognitive_process
- id: COGNITIVE_PROCESS_WEBSEARCH
  category: cognitive_process
  content: "cognitive_process {\n    instruction: \"Execute web search using Google\
    \ grounding. Return structured results.\"\n    steps: [\n        \"1. ANALYZE:\
    \ Extract Object and Criteria from user_query.\",\n        \"2. EXECUTE: Perform\
    \ grounding search using Google Search.\",\n        \"3. VERIFY: Check results\
    \ against Criteria.\",\n        \"4. REFINE: If insufficient, refine search and\
    \ retry.\",\n        \"5. COMPILE: Aggregate ALL non-contradictory results.\"\
    ,\n        \"6. DELIVER: Present final list with summary.\"\n    ]\n}\n"
  metadata:
    description: Web search execution with result verification
    use_case: WebSearch agent - external information retrieval
    override_by:
    - AGENT
    created_at: '2026-02-02'
  class: cognitive_process
- id: COGNITIVE_PROCESS_CONSOLIDATION
  category: cognitive_process
  content: "cognitive_process {\n    instruction: \"Execute steps sequentially. Do\
    \ NOT skip or reorder. Output only JSON.\"\n    steps: [\n        \"0. CONTEXT_AWARENESS:\
    \ Review known_biographical_facts for entity disambiguation.\",\n        \"1.\
    \ INPUT_PARSING: Parse conversation_transcript into turns (USER vs ASSISTANT).\"\
    ,\n        \"2. SOURCE_ATTRIBUTION: Identify USER statements, detect ASSISTANT\
    \ recalls, skip RAG echoes.\",\n        \"3. NEW_INFORMATION_FILTER: Extract ONLY\
    \ if USER provides NEW information.\",\n        \"4. EXTRACTION_VALIDATION: Apply\
    \ Significance + Factuality + Permanence checklist.\",\n        \"5. ENTITY_RECOGNITION:\
    \ Resolve pronouns, disambiguate entities using biographical context.\",\n   \
    \     \"6. CATEGORIZATION: Classify as STATE, EVENT, or PRINCIPLE with ENTITY_SCOPE.\"\
    ,\n        \"7. SYNTHESIS: Merge related statements into rich facts.\",\n    \
    \    \"8. SEMANTIC_DEDUPLICATION: Check PRINCIPLE overlap with established_life_principles.\"\
    ,\n        \"9. TEMPORAL_GROUNDING: Absolutize relative dates.\",\n        \"\
    10. METADATA_EXTRACTION: Apply metadata_schema for structured fields.\",\n   \
    \     \"11. FORMALIZATION: Convert to English, assign tags, format as JSON.\"\n\
    \    ]\n}\n"
  metadata:
    description: Fact extraction and consolidation from conversations
    use_case: Consolidation agent - extracts facts from conversation history
    override_by:
    - AGENT
    created_at: '2026-02-02'
  class: cognitive_process
