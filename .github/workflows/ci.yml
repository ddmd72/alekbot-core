name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ruff lint + unit/architecture tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: make check
        # make check = ruff check src/ + unit/architecture tests.
        # No secrets: the unit suite mocks all I/O at the port/SDK boundary.
        run: make check

      - name: Notify Slack (pass/fail)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          # Untrusted inputs passed via env (never inlined into run: — avoids script injection).
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_CI_WEBHOOK_URL secret not set — skipping Slack notification."
            exit 0
          fi
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          SUMMARY=$(printf '%s' "$COMMIT_MSG" | head -1)
          TEXT="$ICON CI *$STATUS* — \`$REF\` by $ACTOR
          $SUMMARY
          $RUN_URL"
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$(jq -nc --arg t "$TEXT" '{text:$t}')" \
            "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification failed (delivery only — build result unaffected)"
