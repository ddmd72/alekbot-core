steps:
  # Pull previous image to use as build cache (|| true so first deploy doesn't fail)
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args: ["-c", "docker pull gcr.io/$PROJECT_ID/alek-bot-dev:latest || true"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "--cache-from", "gcr.io/$PROJECT_ID/alek-bot-dev:latest",
           "-t", "gcr.io/$PROJECT_ID/alek-bot-dev:latest", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/alek-bot-dev:latest"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "alek-bot-dev"
      - "--image=gcr.io/$PROJECT_ID/alek-bot-dev:latest"
      - "--region=us-central1"
      - "--set-env-vars=APP_ENV=development,SLACK_MODE=http,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_RUN_SERVICE_URL=$_SERVICE_URL,FIRESTORE_DATABASE=us-production,OAUTH_REDIRECT_URI=$_OAUTH_REDIRECT_URI,ENABLE_HISTORY_OPTIMIZATION=true,ENABLE_HTML_RENDERER=true,ENABLE_GROUNDING_ATTRIBUTION=false,DEBUG_PROMPTS=true,DEBUG_PROMPTS_BUCKET=$_DEBUG_PROMPTS_BUCKET,GCS_MEDIA_BUCKET=alek-media-dev,SYSTEM_DEFAULT_LANGUAGE=uk,MCP_RESOURCE_URI=$_SERVICE_URL/mcp,TRACING_BACKEND=both,BIGQUERY_PROMPT_DATASET=alek_observability_dev"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--memory=1024Mi"
      - "--cpu=2"
      - "--timeout=1800"
      - "--port=8080" # Required for HTTP mode
      - "--allow-unauthenticated" # For dev testing
      - "--set-secrets=SLACK_BOT_TOKEN=SLACK_BOT_TOKEN_DEV:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET_DEV:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,FIREBASE_WEB_API_KEY=FIREBASE_WEB_API_KEY:latest,OAUTH_SESSION_SECRET=OAUTH_SESSION_SECRET:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN_DEV:latest,TELEGRAM_WEBHOOK_SECRET=TELEGRAM_WEBHOOK_SECRET_DEV:latest,DOCS_OWNER_USER_ID=docs-owner-user-id:latest,GMAIL_OAUTH_REDIRECT_URI=GMAIL_OAUTH_REDIRECT_URI_DEV:latest,GOOGLE_TASKS_OAUTH_REDIRECT_URI=GOOGLE_TASKS_OAUTH_REDIRECT_URI_DEV:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_DEEP_RESEARCH_WEBHOOK_URL=OPENAI_DEEP_RESEARCH_WEBHOOK_URL_DEV:latest,OPENAI_DEEP_RESEARCH_WEBHOOK_SECRET=OPENAI_DEEP_RESEARCH_WEBHOOK_SECRET_DEV:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,UNSPLASH_ACCESS_KEY=UNSPLASH_ACCESS_KEY:latest,MICROSOFT_TODO_CLIENT_ID=MICROSOFT_TODO_CLIENT_ID:latest,MICROSOFT_TODO_CLIENT_SECRET=MICROSOFT_TODO_CLIENT_SECRET:latest,MICROSOFT_TODO_REDIRECT_URI=MICROSOFT_TODO_REDIRECT_URI_DEV:latest,MICROSOFT_TASKS_WEBHOOK_SECRET=MICROSOFT_TASKS_WEBHOOK_SECRET:latest,BILLING_SLACK_WEBHOOK_URL=BILLING_SLACK_WEBHOOK_URL:latest,SLACK_APP_TOKEN=SLACK_APP_TOKEN:latest,GOOGLE_SEARCH_CX=GOOGLE_SEARCH_CX:latest,SERVICE_ACCOUNT_EMAIL=SERVICE_ACCOUNT_EMAIL:latest,LOGFIRE_TOKEN=LOGFIRE_TOKEN:latest"

  # Explicitly grant public access — --allow-unauthenticated alone is not
  # reliable if the Cloud Build SA lacks roles/iam.securityAdmin.
  # This step is idempotent and ensures every deployment leaves the service
  # publicly accessible.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "add-iam-policy-binding"
      - "alek-bot-dev"
      - "--region=us-central1"
      - "--member=allUsers"
      - "--role=roles/run.invoker"

  # Deploy Cloud Run Job for deep research (same image, different entrypoint).
  # task-timeout: 3600s (1 hour) — covers first pass + second pass for large research.
  # max-retries: 0 — no automatic retries; the research loop has its own overload retry.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "alek-research-job-dev"
      - "--image=gcr.io/$PROJECT_ID/alek-bot-dev:latest"
      - "--region=us-central1"
      - "--command=python"
      - "--args=job_main.py"
      - "--max-retries=0"
      - "--task-timeout=18000"
      - "--memory=1024Mi"
      - "--cpu=2"
      - "--set-env-vars=APP_ENV=development,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_RUN_SERVICE_URL=$_SERVICE_URL,DEBUG_PROMPTS=true,DEBUG_PROMPTS_BUCKET=$_DEBUG_PROMPTS_BUCKET,GCS_MEDIA_BUCKET=alek-media-dev,BIGQUERY_PROMPT_DATASET=alek_observability_dev"
      - "--set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,SERVICE_ACCOUNT_EMAIL=SERVICE_ACCOUNT_EMAIL:latest"
      - "--project=$PROJECT_ID"

  # Keep the dev container warm to avoid ~30s cold starts (min-instances=0).
  # update falls through to create on first deploy.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # OIDC identity for /worker scheduler jobs. The /worker route verifies a
        # Google-signed token whose email == this SA (audience is not pinned —
        # see src/web/worker_oidc_verifier.py). Derive the default compute SA
        # from the project number so no infra id is hardcoded (secrets rule).
        SA="$$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')-compute@developer.gserviceaccount.com"
        gcloud scheduler jobs update http alek-bot-dev-keep-alive \
          --schedule="*/10 * * * *" \
          --uri="$_SERVICE_URL/health" \
          --http-method=GET \
          --location=us-central1 \
          --attempt-deadline=30s \
          --project=$PROJECT_ID 2>/dev/null \
        || gcloud scheduler jobs create http alek-bot-dev-keep-alive \
          --schedule="*/10 * * * *" \
          --uri="$_SERVICE_URL/health" \
          --http-method=GET \
          --location=us-central1 \
          --attempt-deadline=30s \
          --project=$PROJECT_ID

        gcloud scheduler jobs delete alek-bot-dev-renew-task-subscriptions \
          --location=us-central1 --project=$PROJECT_ID --quiet 2>/dev/null || true
        gcloud scheduler jobs create http alek-bot-dev-renew-task-subscriptions \
          --schedule="0 2 * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"renew_all_task_subscriptions"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-dev-start-email-indexing \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http alek-bot-dev-start-email-indexing \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"start_email_indexing"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-dev-start-email-indexing \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"start_email_indexing"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-dev-fire-due-reminders \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http alek-bot-dev-fire-due-reminders \
          --schedule="*/5 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"fire_due_reminders"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-dev-fire-due-reminders \
          --schedule="*/5 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"fire_due_reminders"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-dev-billing-daily-summary \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http alek-bot-dev-billing-daily-summary \
          --schedule="0 9 * * *" \
          --time-zone="Europe/Madrid" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"billing_daily_summary"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-dev-billing-daily-summary \
          --schedule="0 9 * * *" \
          --time-zone="Europe/Madrid" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"billing_daily_summary"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-dev-repair-email-embeddings \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http alek-bot-dev-repair-email-embeddings \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"repair_email_embeddings"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=300s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-dev-repair-email-embeddings \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"repair_email_embeddings"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=300s \
          --project=$PROJECT_ID

        gcloud scheduler jobs describe alek-bot-dev-sweep-consolidation \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http alek-bot-dev-sweep-consolidation \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"sweep_consolidation"}' \
          --update-headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID \
        || gcloud scheduler jobs create http alek-bot-dev-sweep-consolidation \
          --schedule="0 * * * *" \
          --uri="$_SERVICE_URL/worker" \
          --oidc-service-account-email="$$SA" \
          --http-method=POST \
          --message-body='{"task_type":"sweep_consolidation"}' \
          --headers="Content-Type=application/json" \
          --location=us-central1 \
          --attempt-deadline=60s \
          --project=$PROJECT_ID
