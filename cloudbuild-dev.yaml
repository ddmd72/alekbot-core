steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/alek-bot-dev:latest", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/alek-bot-dev:latest"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "python3"
    args:
      - "scripts/infrastructure/deploy_firestore_indexes.py"
      - "config/firestore.indexes.json"
      - "$PROJECT_ID"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "alek-bot-dev"
      - "--image=gcr.io/$PROJECT_ID/alek-bot-dev:latest"
      - "--region=us-central1"
      - "--set-env-vars=APP_ENV=development,SLACK_MODE=http,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_RUN_SERVICE_URL=$_SERVICE_URL,FIRESTORE_DATABASE=us-production,OAUTH_REDIRECT_URI=$_OAUTH_REDIRECT_URI,ENABLE_HISTORY_OPTIMIZATION=true,ENABLE_HTML_RENDERER=true"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--memory=1024Mi"
      - "--cpu=2"
      - "--port=8080" # Required for HTTP mode
      - "--allow-unauthenticated" # For dev testing
      - "--set-secrets=SLACK_BOT_TOKEN=SLACK_BOT_TOKEN_DEV:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET_DEV:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,FIREBASE_WEB_API_KEY=FIREBASE_WEB_API_KEY:latest,OAUTH_SESSION_SECRET=OAUTH_SESSION_SECRET:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN_DEV:latest,TELEGRAM_WEBHOOK_SECRET=TELEGRAM_WEBHOOK_SECRET_DEV:latest,DOCS_OWNER_USER_ID=docs-owner-user-id:latest,GMAIL_OAUTH_REDIRECT_URI=GMAIL_OAUTH_REDIRECT_URI_DEV:latest"

  # Explicitly grant public access — --allow-unauthenticated alone is not
  # reliable if the Cloud Build SA lacks roles/iam.securityAdmin.
  # This step is idempotent and ensures every deployment leaves the service
  # publicly accessible.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "add-iam-policy-binding"
      - "alek-bot-dev"
      - "--region=us-central1"
      - "--member=allUsers"
      - "--role=roles/run.invoker"
